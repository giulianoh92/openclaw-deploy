services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - openclaw-data:/home/node
      - ./openclaw.json:/home/node/.openclaw/openclaw.json:ro
      - ./SOUL.md:/home/node/.openclaw/SOUL.md:ro
      - ${VAULT_DIR:-/opt/vault}:/vault
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-cli
    user: "1000:1000"
    profiles:
      - cli
    volumes:
      - openclaw-data:/home/node
      - ./openclaw.json:/home/node/.openclaw/openclaw.json:ro
      - ./SOUL.md:/home/node/.openclaw/SOUL.md:ro
      - ${VAULT_DIR:-/opt/vault}:/vault
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}

volumes:
  openclaw-data:
